<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

    <link rel="stylesheet" href="../css/styles.css">


</head>

<body>

    <header>
        <div class="encabezado text-center">
            <h1>Catálogo de Servicios Digitales</h1>
        </div>
        <nav class="navbar navbar-expand-lg  mi-navbar py-1">
            <div class="collapse navbar-collapse">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="navbar-nav me-auto ms-5 fs-6">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="../index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="registarse.html">Registrarse</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="Regsitarse.html">Contacto</a>
                        </li>
                
                    </ul>
                    <button id="modoBtn" class="btn btn-dark me-5 ms-5">
                        Modo oscuro
                    </button>

                </div>
            </div>
        </nav>
    </header>
    <div class="encabezado text-center">
        <h3 class="mt-5 ">Registro de Cliente</h3>
    </div>
    
    <form class="row g-3 py-4 me-auto ms-4 " id="formRegistro">
        <div class="col-md-4">
            <label for="validationServer01" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" required>

        </div>
        <div class="col-md-4">
            <label for="validationServer02" class="form-label">Apellido</label>
            <input type="text" class="form-control" id="apellido" required>

        </div>
    
        <div class="col-md-6">
            <label for="inputEmail4" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
        </div>
        <div class="col-md-6">
            <label for="inputCity" class="form-label">Ciudad</label>
            <input type="text" class="form-control" id="ciudad" required>
        </div>
        <div class="col-md-4">
            <label for="Tipo de servicio" class="form-label">Tipo de servicio de interés</label>
            <select id="Tipo" class="form-select " required>
                <option selected>Eleguir...</option>
                <option>Desarrollo web</option>
                <option>Hosting</option>
                <option>Diseño UX/UI</option>
                <option>Marketing digital</option>
                <option>SEO</option>
                <option>Desarrollo móvil</option>
                <option>Soporte técnico</option>
                <option>Consultoría tecnológica</option>

       
            </select>
        </div>
        <div class="col-md-2">
            <label for="inputZip" class="form-label">Edad   </label>
            <input type="number" class="form-control" id="edad" required>
        </div>
        <div class="col-12">
            <button type="button" class="btn btn-primary me-auto ms-1" onclick="registrar()">Registar</button>
            <button type="reset" class="btn btn-danger me-auto ms-2">Cancelar</button>
        </div>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="../js/script.js"></script>

</body>

</html>
